name: OCI Free Tier Instance Creation

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup OCI config
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CONFIG }}" > ~/.oci/config
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/private_key.pem
          chmod 600 ~/.oci/private_key.pem
          sed -i 's|key_file=.*|key_file=/home/runner/.oci/private_key.pem|' ~/.oci/config

      - name: Run instance creation script
        env:
          OCT_FREE_AD: ${{ secrets.OCT_FREE_AD }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHATID: ${{ secrets.TELEGRAM_CHATID }}
        run: python main.py
