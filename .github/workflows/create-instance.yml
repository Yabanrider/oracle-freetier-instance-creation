name: OCI Free Tier Instance Creation

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  create-instance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Setup OCI config and SSH key
        run: |
          mkdir -p /home/runner/.oci
          echo "${{ secrets.OCI_CONFIG }}" > /home/runner/.oci/config
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > /home/runner/.oci/private_key.pem
          chmod 600 /home/runner/.oci/private_key.pem
          sed -i 's|key_file=.*|key_file=/home/runner/.oci/private_key.pem|' /home/runner/.oci/config
          ssh-keygen -t rsa -b 2048 -f /home/runner/.oci/ssh_key -N ""

      - name: Override oci.env paths
        run: |
          sed -i 's|OCI_CONFIG=.*|OCI_CONFIG=/home/runner/.oci/config|' oci.env
          sed -i 's|SSH_AUTHORIZED_KEYS_FILE=.*|SSH_AUTHORIZED_KEYS_FILE=/home/runner/.oci/ssh_key.pub|' oci.env

      - name: Run instance creation script
        env:
          OCI_CONFIG: /home/runner/.oci/config
          SSH_AUTHORIZED_KEYS_FILE: /home/runner/.oci/ssh_key.pub
          OCT_FREE_AD: ${{ secrets.OCT_FREE_AD }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
        run: |
          timeout 21600 python -u main.py 2>&1 || true
          echo "=== SETUP LOG ==="
          cat setup_and_info.log 2>/dev/null || echo "LOG YOK"
          echo "=== LAUNCH LOG (SON 20 SATIR) ==="
          tail -20 launch_instance.log 2>/dev/null || echo "LOG YOK"
          echo "=== ERROR LOG ==="
          cat ERROR_IN_CONFIG.log 2>/dev/null || echo "HATA YOK"
